<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/api/site-config/icon/favicon" id="dynamic-favicon" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no" />
    <!-- PWA 全屏模式支持 -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <link rel="apple-touch-icon" sizes="192x192" href="/pwa-icons/icon-192.png" />
    <link rel="apple-touch-icon" sizes="512x512" href="/pwa-icons/icon-512.png" />
    <link rel="manifest" href="/api/site-config/manifest.json" crossorigin="use-credentials" />
    <meta name="theme-color" content="#f0c040" />
    <title>小金库 Golden Nest</title>
    <style>
      /* iOS Safari 动态视口适配 */
      :root {
        --vh: 1vh;
      }
      
      /* 防止 iOS Safari 橡皮筋效果时出现白边 */
      html, body {
        overscroll-behavior: none;
      }
      
      /* iOS Safari 底部安全区域 */
      body {
        padding-bottom: env(safe-area-inset-bottom);
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <!-- 白屏恢复：如果 Vue 应用 JS 加载失败（SSL证书/网络问题），显示恢复提示 -->
    <div id="app-fallback" style="display:none;position:fixed;inset:0;background:#0f172a;color:#e2e8f0;
      font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
      display:none;align-items:center;justify-content:center;padding:24px;z-index:99999">
      <div style="background:#1e293b;border-radius:20px;padding:36px 28px;max-width:360px;width:100%;text-align:center;box-shadow:0 25px 50px rgba(0,0,0,.4)">
        <div style="font-size:48px;margin-bottom:12px">🔌</div>
        <h2 style="font-size:18px;margin-bottom:6px">应用加载失败</h2>
        <p style="font-size:13px;color:#94a3b8;line-height:1.6;margin-bottom:20px">可能是网络异常或 SSL 证书需要重新信任</p>
        <a id="fallback-diagnose" target="_blank"
          style="display:block;padding:11px;border-radius:10px;background:#3b82f6;color:#fff;
          font-weight:600;font-size:14px;text-decoration:none;margin-bottom:8px">诊断连接</a>
        <button onclick="location.reload()"
          style="display:block;width:100%;padding:11px;border:none;border-radius:10px;
          background:#334155;color:#94a3b8;font-size:14px;cursor:pointer;margin-bottom:8px">重新加载</button>
        <button onclick="clearCacheAndReload()"
          style="display:block;width:100%;padding:10px;border:none;border-radius:10px;
          background:#7f1d1d;color:#fca5a5;font-size:12px;cursor:pointer">清除缓存并重载</button>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
    <script>
      // 白屏检测：如果 3 秒后 #app 仍然是空的，显示恢复 UI
      setTimeout(function() {
        var app = document.getElementById('app');
        if (app && app.children.length === 0) {
          var fb = document.getElementById('app-fallback');
          if (fb) fb.style.display = 'flex';
          var link = document.getElementById('fallback-diagnose');
          if (link) link.href = location.origin + '/api/health';
        }
      }, 3000);

      function clearCacheAndReload() {
        if ('caches' in window) {
          caches.keys().then(function(names) {
            return Promise.all(names.map(function(n){ return caches.delete(n) }));
          }).then(function(){
            if (navigator.serviceWorker) {
              navigator.serviceWorker.getRegistrations().then(function(regs) {
                regs.forEach(function(r){ r.unregister() });
                location.reload();
              });
            } else { location.reload(); }
          });
        } else { location.reload(); }
      }
    </script>
    <script>
      // 注册 Service Worker（PWA 安装必需）
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function() {
          navigator.serviceWorker.register('/sw.js', { scope: '/' })
            .then(function(reg) { console.log('SW registered:', reg.scope) })
            .catch(function(err) { console.log('SW registration failed:', err) })
        })
      }
      // 动态计算真实视口高度，解决 iOS Safari 工具栏问题
      function setVH() {
        const vh = window.innerHeight * 0.01;
        document.documentElement.style.setProperty('--vh', `${vh}px`);
      }
      setVH();
      window.addEventListener('resize', setVH);
      window.addEventListener('orientationchange', function() {
        setTimeout(setVH, 100);
      });
    </script>
  </body>
</html>
