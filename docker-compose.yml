include:
  # PhotoPrism 照片管理 (profile: media)
  - path: ./external/PhotoPrism/docker-compose.yaml

services:
  # ========================
  # 入口网关 (Level 1 - 超稳定, 永远不被迭代影响)
  # ========================
  gateway:
    build:
      context: .
      dockerfile: gateway/Dockerfile
    container_name: golden-nest-gateway
    restart: unless-stopped
    profiles: ["core", "all"]
    ports:
      - "${HTTP_PORT:-8088}:80"
      - "${HTTPS_PORT:-8443}:443"
    volumes:
      - ./ssl:/etc/nginx/ssl:ro
      - studio-uploads:/data/studio-uploads:ro
    environment:
      - HTTPS_PORT=${HTTPS_PORT:-8443}
    # depends_on:
      # - frontend
      # - studio
    networks:
      - golden-nest-network

  # ========================
  # OpenClaw AI Gateway (Level 1 - AI 助手控制面)
  # ========================
  openclaw:
    image: openclaw:local
    container_name: golden-nest-openclaw
    restart: unless-stopped
    profiles: ["openclaw"]
    environment:
      - HOME=/home/node
      - TERM=xterm-256color
      - OPENCLAW_GATEWAY_TOKEN=${OPENCLAW_GATEWAY_TOKEN:-}
    volumes:
      - ./data/openclaw/config:/home/node/.openclaw
      - ./data/openclaw/workspace:/home/node/.openclaw/workspace
    init: true
    command:
      [
        "node",
        "dist/index.js",
        "gateway",
        "--bind",
        "lan",
        "--port",
        "18789",
        "--allow-unconfigured",
      ]
    networks:
      - golden-nest-network

  # ========================
  # 设计院后端 (Level 1 - 超稳定, AI 驱动的迭代平台)
  # ========================
  studio:
    build: ./studio
    container_name: golden-nest-studio
    restart: unless-stopped
    profiles: ["core", "all"]
    environment:
      # ── Git / VCS 配置 (可选) ──
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
      - GITHUB_REPO=${GITHUB_REPO:-}
      - GIT_CLONE_URL=${GIT_CLONE_URL:-}
      - COPILOT_API_KEY=${COPILOT_API_KEY:-}
      - STUDIO_DATA_PATH=/data
      # ── 设计院认证 ──
      - STUDIO_ADMIN_PASS=${STUDIO_ADMIN_PASS:-}
      - STUDIO_SECRET_KEY=${STUDIO_SECRET_KEY:-}
      # ── 主项目 SSO (可选, 留空禁用) ──
      - MAIN_API_URL=${MAIN_API_URL:-}
      - SSO_TOKEN_KEY=${SSO_TOKEN_KEY:-}
      # ── 部署流水线配置 (可选, 留空禁用对应功能) ──
      - DEPLOY_SERVICES=${DEPLOY_SERVICES:-}
      - DEPLOY_GIT_BRANCH=${DEPLOY_GIT_BRANCH:-}
      - DEPLOY_HEALTH_CHECKS=${DEPLOY_HEALTH_CHECKS:-}
      - DOCKER_IMAGE_PREFIX=${DOCKER_IMAGE_PREFIX:-}
      - SNAPSHOT_DB_PATHS=${SNAPSHOT_DB_PATHS:-}
    volumes:
      - studio-data:/data
      - studio-uploads:/data/uploads
      - /var/run/docker.sock:/var/run/docker.sock
      - .:/workspace:ro
    networks:
      - golden-nest-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/studio-api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ========================
  # JupyterLab (Level 1 - 数据分析平台)
  # ========================
  jupyter:
    build: ./external/Jupyter
    container_name: golden-nest-external-jupyter
    restart: unless-stopped
    profiles: ["tools", "all"]
    ports:
      - "8888:8888"
    environment:
      - JUPYTER_PORT=8888
      - JUPYTER_BASE_URL=/jupyter/
      - JUPYTER_TOKEN=${JUPYTER_TOKEN:-}
    volumes:
      # 主工作目录: 映射本地项目目录 (可在 .env 中覆盖)
      - ${JUPYTER_WORKSPACE:-/home/macaulish/workspace/showmylove}:/workspace
    networks:
      - golden-nest-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8888/jupyter/api/status"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ========================
  # 主项目后端 (Level 2 - 可被设计院迭代)
  # ========================
  backend:
    build: ./backend
    container_name: golden-nest-backend
    restart: unless-stopped
    profiles: ["core", "all"]
    environment:
      - DATABASE_URL=sqlite+aiosqlite:////data/golden_nest.db
      - SECRET_KEY=${SECRET_KEY:-your-super-secret-key-change-me}
      - ACCESS_TOKEN_EXPIRE_MINUTES=10080
    volumes:
      - ./data:/data
      - ./data/uploads:/app/uploads
      - ./ssl/ca.pem:/app/ssl/ca.pem:ro
    networks:
      - golden-nest-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ========================
  # 主项目前端 (Level 2 - 不再直接暴露端口, 由网关代理)
  # SSL 由网关负责, 前端只需 HTTP 模式
  # ========================
  frontend:
    build: ./frontend
    container_name: golden-nest-frontend
    restart: unless-stopped
    profiles: ["core", "all"]
    volumes:
      - ./data/uploads/site:/usr/share/nginx/pwa-icons:ro
    environment:
      - HTTPS_PORT=${HTTPS_PORT:-8443}
    depends_on:
      - backend
    networks:
      - golden-nest-network

  # ========================
  # Homarr Dashboard (Level 1 - 服务器仪表盘)
  # ========================
  homarr:
    image: ghcr.io/homarr-labs/homarr:latest
    container_name: golden-nest-homarr
    restart: unless-stopped
    profiles: ["tools", "all"]
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - homarr-data:/appdata
    environment:
      - SECRET_ENCRYPTION_KEY=${SECRET_KEY:-68d2b8fc2e05aa319a69e64bf3dbf689912662a6683d187c5148ccc629822c64}
    networks:
      - golden-nest-network

networks:
  golden-nest-network:
    driver: bridge

volumes:
  golden-nest-data:
  studio-data:
  studio-uploads:
  openclaw-config:
  openclaw-workspace:
  homarr-data:
