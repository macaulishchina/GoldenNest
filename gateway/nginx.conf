# Golden Nest Gateway - HTTP 模式
# 所有流量入口，路由到各容器

# WebSocket 升级请求路由到 OpenClaw Gateway
# (Control UI 默认从 ws://host 连接, 无路径前缀)
map $http_upgrade $root_backend {
    default     http://frontend:80;
    ~*websocket http://openclaw:18789;
}

server {
    listen 80;
    server_name _;

    # ========================
    # 设计院 (Level 1 - 超稳定)
    # ========================

    # 设计院前端静态文件
    # /studio (无尾斜杠) → 301 到 /studio/
    location = /studio {
        return 301 $scheme://$http_host/studio/;
    }

    location /studio/ {
        alias /usr/share/nginx/studio/;
        index index.html;
        try_files $uri $uri/ /studio/index.html;

        location ~* \.html$ {
            add_header Cache-Control "no-cache, no-store, must-revalidate";
        }
        location ~* \.(js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|ico)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
        }
    }

    # 设计院 API 代理
    location /studio-api/ {
        proxy_pass http://studio:8002/studio-api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_buffering off;
        chunked_transfer_encoding on;
        client_max_body_size 20m;
    }

    # 设计院上传文件
    location /studio-uploads/ {
        alias /data/studio-uploads/;
        expires 30d;
        add_header Cache-Control "public";
    }

    # ========================
    # OpenClaw AI Gateway (Level 1)
    # ========================

    # OpenClaw Control UI + WebSocket 代理
    location /openclaw {
        proxy_pass http://openclaw:18789;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # ========================
    # JupyterLab (Level 1 - 数据分析平台)
    # 访问: /jupyter/
    # ========================

    # /jupyter (无尾斜杠) → 301 到 /jupyter/
    location = /jupyter {
        return 301 $scheme://$http_host/jupyter/;
    }

    location /jupyter/ {
        proxy_pass http://jupyter:8888/jupyter/;
        proxy_http_version 1.1;

        # WebSocket 支持（Kernel 通信必需）
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Jupyter 长连接超时
        proxy_read_timeout  86400s;
        proxy_send_timeout  86400s;

        # 关闭缓冲，保证 notebook 输出实时推送
        proxy_buffering off;
    }

    # ========================
    # PhotoPrism (Level 1 - 家庭相册)
    # 访问: /photos/
    # PhotoPrism 不支持 subpath, 用 sub_filter 改写绝对路径
    # ========================

    # /photos (无尾斜杠) → 301 到 /photos/
    location = /photos {
        return 301 $scheme://$http_host/photos/;
    }

    location /photos/ {
        proxy_pass http://photoprism:2342/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Accept-Encoding "";   # 禁止后端 gzip, 确保 sub_filter 能工作
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_buffering off;
        client_max_body_size 500m;

        # 改写 HTML 中的绝对路径为 /photos/ 前缀
        sub_filter_once off;
        sub_filter_types text/html text/css application/javascript application/json;
        sub_filter 'href="/' 'href="/photos/';
        sub_filter 'src="/' 'src="/photos/';
        sub_filter 'action="/' 'action="/photos/';
        sub_filter '"/api/' '"/photos/api/';
        sub_filter '"url":"/' '"url":"/photos/';
    }

    # PhotoPrism 静态资源回落 (前端直接请求 /build/ 等绝对路径)
    location /build/ {
        proxy_pass http://photoprism:2342/build/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location /static/ {
        proxy_pass http://photoprism:2342/static/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # ========================
    # 主项目 (Level 2 - 可被迭代)
    # ========================

    # 主项目 API 代理
    location /api/ {
        proxy_pass http://frontend:80/api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        client_max_body_size 100m;
    }

    # 主项目上传文件
    location ^~ /uploads/ {
        proxy_pass http://frontend:80/uploads/;
        proxy_set_header Host $host;
        expires 30d;
        add_header Cache-Control "public";
    }

    # PWA 图标
    location ^~ /pwa-icons/ {
        proxy_pass http://frontend:80/pwa-icons/;
        expires 30d;
        add_header Cache-Control "public";
    }

    # Service Worker
    location = /sw.js {
        proxy_pass http://frontend:80/sw.js;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # 主项目前端 (默认路由 - catch-all)
    location / {
        proxy_pass $root_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_vary on;
    gzip_min_length 1000;
}
