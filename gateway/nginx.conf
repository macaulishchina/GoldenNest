# Golden Nest Gateway - HTTP 模式
# 所有流量入口，路由到各容器

# WebSocket 升级请求路由到前端
map $http_upgrade $root_backend {
    default     http://frontend:80;
}

server {
    listen 80;
    server_name _;

    # ========================
    # 设计院 (Level 1 - 超稳定)
    # ========================

    # 设计院前端静态文件
    # /studio (无尾斜杠) → 301 到 /studio/
    location = /studio {
        return 301 $scheme://$http_host/studio/;
    }

    location /studio/ {
        alias /usr/share/nginx/studio/;
        index index.html;
        try_files $uri $uri/ /studio/index.html;

        location ~* \.html$ {
            add_header Cache-Control "no-cache, no-store, must-revalidate";
        }
        location ~* \.(js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|ico)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
        }
    }

    # 设计院 API 代理
    location /studio-api/ {
        resolver 127.0.0.11 valid=30s;
        set $studio_upstream http://studio:8002;
        proxy_pass $studio_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_buffering off;
        chunked_transfer_encoding on;
        client_max_body_size 20m;
    }

    # 设计院上传文件
    location /studio-uploads/ {
        alias /data/studio-uploads/;
        expires 30d;
        add_header Cache-Control "public";
    }

    # ========================
    # OpenClaw AI Gateway (Level 1) - 可选服务
    # ========================

    # OpenClaw Control UI + WebSocket 代理 (动态解析，openclaw 不运行时返回 502)
    location /openclaw {
        resolver 127.0.0.11 valid=30s;
        set $openclaw_upstream http://openclaw:18789;
        proxy_pass $openclaw_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;

        # 允许 iframe 嵌入（应用中心全屏模式）
        proxy_hide_header X-Frame-Options;
        proxy_hide_header Content-Security-Policy;
    }

    # ========================
    # JupyterLab (Level 1 - 数据分析平台)
    # 访问: /jupyter/
    # ========================

    # /jupyter (无尾斜杠) → 301 到 /jupyter/
    location = /jupyter {
        return 301 $scheme://$http_host/jupyter/;
    }

    location /jupyter/ {
        resolver 127.0.0.11 valid=30s;
        set $jupyter_upstream http://jupyter:8888;
        proxy_pass $jupyter_upstream;
        proxy_http_version 1.1;

        # WebSocket 支持（Kernel 通信必需）
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Jupyter 长连接超时
        proxy_read_timeout  86400s;
        proxy_send_timeout  86400s;

        # 允许 iframe 嵌入（应用中心全屏模式）
        proxy_hide_header X-Frame-Options;
        proxy_hide_header Content-Security-Policy;

        # 关闭缓冲，保证 notebook 输出实时推送
        proxy_buffering off;
    }

    # ========================
    # PhotoPrism (Level 1 - 家庭相册)
    # 访问: /photo/
    # SITE_URL 含 /photo/ → PhotoPrism 原生工作在子路径下（类似 Jupyter 的 BASE_URL）
    # 无需 rewrite/sub_filter/proxy_redirect，直接透传
    # ========================

    # /photo (无尾斜杠) → 301 到 /photo/
    location = /photo {
        return 301 $scheme://$http_host/photo/;
    }

    location /photo/ {
        resolver 127.0.0.11 valid=30s;
        set $photoprism_upstream http://photoprism:2342;
        proxy_pass $photoprism_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_buffering off;
        client_max_body_size 500m;

        # 允许 iframe 嵌入（应用中心全屏模式）
        proxy_hide_header X-Frame-Options;
        proxy_hide_header Content-Security-Policy;
    }

    # ========================
    # Homarr Dashboard (Level 1 - 服务器仪表盘)
    # 访问: /home/
    # ========================

    location = /home {
        return 301 $scheme://$http_host/home/;
    }

    location /home/ {
        resolver 127.0.0.11 valid=30s;
        set $homarr_upstream http://homarr:7575;
        rewrite ^/home/(.*) /$1 break;
        proxy_pass $homarr_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Accept-Encoding "";
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;

        # 允许 iframe 嵌入（应用中心全屏模式）
        proxy_hide_header X-Frame-Options;
        proxy_hide_header Content-Security-Policy;

        # 改写后端返回的 Location 头，加上 /home 前缀（保留端口）
        proxy_redirect ~^/(.*) $scheme://$http_host/home/$1;

        # 改写 HTML 中的绝对路径
        sub_filter_once off;
        sub_filter_types text/html text/css application/javascript application/json;
        sub_filter 'href="/' 'href="/home/';
        sub_filter 'src="/' 'src="/home/';
        sub_filter 'action="/' 'action="/home/';
        sub_filter '"/api/' '"/home/api/';
    }

    # ========================
    # Antigravity Manager (Level 1 - AI API 代理管理)
    # 访问: /antigravity-manager/
    # 前端已通过 VITE_BASE_PATH=/antigravity-manager/ 构建，自带子路径支持
    # ========================

    location = /antigravity-manager {
        return 301 $scheme://$http_host/antigravity-manager/;
    }

    location /antigravity-manager/ {
        resolver 127.0.0.11 valid=30s;
        set $antigravity_upstream http://antigravity-manager:8045;
        rewrite ^/antigravity-manager/(.*) /$1 break;
        proxy_pass $antigravity_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_buffering off;
        client_max_body_size 100m;

        # 允许 iframe 嵌入（应用中心全屏模式）
        proxy_hide_header X-Frame-Options;
        proxy_hide_header Content-Security-Policy;
    }

    # ========================
    # Mihomo Dashboard (Level 1 - 代理可视化)
    # 访问: /proxy-ui/
    # ========================

    location = /proxy-ui {
        return 301 $scheme://$http_host/proxy-ui/;
    }

    location /proxy-ui/ {
        resolver 127.0.0.11 valid=30s;
        set $proxy_ui_upstream http://metacubexd:80;
        rewrite ^/proxy-ui/(.*) /$1 break;
        proxy_pass $proxy_ui_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Accept-Encoding "";
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;

        proxy_hide_header X-Frame-Options;
        proxy_hide_header Content-Security-Policy;

        proxy_redirect ~^/(.*) $scheme://$http_host/proxy-ui/$1;

        sub_filter_once off;
        sub_filter_types text/html text/css application/javascript application/json;
        sub_filter 'href="/' 'href="/proxy-ui/';
        sub_filter 'src="/' 'src="/proxy-ui/';
        sub_filter 'action="/' 'action="/proxy-ui/';
    }

    # ========================
    # FRP Web 配置客户端 (Level 1 - 内网穿透管理)
    # 访问: /frpc/
    # ========================

    location = /frpc {
        return 301 $scheme://$http_host/frpc/;
    }

    location /frpc/ {
        resolver 127.0.0.11 valid=30s;
        set $frp_web_upstream http://frp-web:8156;
        rewrite ^/frpc/(.*) /$1 break;
        proxy_pass $frp_web_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_buffering off;

        proxy_hide_header X-Frame-Options;
        proxy_hide_header Content-Security-Policy;
    }

    # Mihomo API 反代（在 Dashboard 里填写 External Controller 时可用）
    location /proxy-api/ {
        resolver 127.0.0.11 valid=30s;
        set $mihomo_api_upstream http://mihomo:9090;
        rewrite ^/proxy-api/(.*) /$1 break;
        proxy_pass $mihomo_api_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_buffering off;
    }

    # ========================
    # 主项目 (Level 2 - 可被迭代)
    # ========================

    # 主项目 API 代理
    location /api/ {
        proxy_pass http://frontend:80/api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        client_max_body_size 100m;
    }

    # 主项目上传文件
    location ^~ /uploads/ {
        proxy_pass http://frontend:80/uploads/;
        proxy_set_header Host $host;
        expires 30d;
        add_header Cache-Control "public";
    }

    # PWA 图标
    location ^~ /pwa-icons/ {
        proxy_pass http://frontend:80/pwa-icons/;
        expires 30d;
        add_header Cache-Control "public";
    }

    # Service Worker
    location = /sw.js {
        proxy_pass http://frontend:80/sw.js;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # 主项目前端 (默认路由 - catch-all)
    location / {
        proxy_pass $root_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_vary on;
    gzip_min_length 1000;
}
