# Golden Nest Gateway - HTTPS 模式

# WebSocket 升级请求路由到前端
map $http_upgrade $root_backend {
    default     http://frontend:80;
}

server {
    listen 80;
    server_name _;
    return 301 https://$host:${HTTPS_PORT}$request_uri;
}

server {
    listen 443 ssl;
    server_name _;

    ssl_certificate     /etc/nginx/ssl/cert.pem;
    ssl_certificate_key /etc/nginx/ssl/key.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # CA 证书下载
    location = /ca.pem {
        alias /etc/nginx/ssl/ca.pem;
        add_header Content-Type "application/x-pem-file";
        add_header Content-Disposition 'attachment; filename="GoldenNest-CA.pem"';
    }

    # ========================
    # 设计院 (Level 1 - 超稳定)
    # ========================

    # /studio (无尾斜杠) → 301 到 /studio/ (保持 https)
    location = /studio {
        return 301 $scheme://$http_host/studio/;
    }

    location /studio/ {
        alias /usr/share/nginx/studio/;
        index index.html;
        try_files $uri $uri/ /studio/index.html;

        # HTML 不缓存，JS/CSS 文件名含 hash 可长期缓存
        location ~* \.html$ {
            add_header Cache-Control "no-cache, no-store, must-revalidate";
        }
        location ~* \.(js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|ico)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
        }
    }

    location /studio-api/ {
        resolver 127.0.0.11 valid=30s;
        set $studio_upstream http://studio:8002;
        proxy_pass $studio_upstream/studio-api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_buffering off;
        chunked_transfer_encoding on;
        client_max_body_size 20m;
    }

    location /studio-uploads/ {
        alias /data/studio-uploads/;
        expires 30d;
        add_header Cache-Control "public";
    }

    # ========================
    # OpenClaw AI Gateway (Level 1) - 可选服务
    # ========================

    # OpenClaw Control UI + WebSocket 代理 (动态解析，openclaw 不运行时返回 502)
    location /openclaw {
        resolver 127.0.0.11 valid=30s;
        set $openclaw_upstream http://openclaw:18789;
        proxy_pass $openclaw_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;

        # 允许 iframe 嵌入（应用中心全屏模式）
        proxy_hide_header X-Frame-Options;
        proxy_hide_header Content-Security-Policy;
    }

    # ========================
    # JupyterLab (Level 1 - 数据分析平台)
    # 访问: /jupyter/
    # ========================

    # /jupyter (无尾斜杠) → 301 到 /jupyter/
    location = /jupyter {
        return 301 $scheme://$http_host/jupyter/;
    }

    location /jupyter/ {
        resolver 127.0.0.11 valid=30s;
        set $jupyter_upstream http://jupyter:8888;
        proxy_pass $jupyter_upstream;
        proxy_http_version 1.1;

        # WebSocket 支持（Kernel 通信必需）
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Jupyter 长连接超时
        proxy_read_timeout  86400s;
        proxy_send_timeout  86400s;

        # 允许 iframe 嵌入（应用中心全屏模式）
        proxy_hide_header X-Frame-Options;
        proxy_hide_header Content-Security-Policy;

        # 关闭缓冲，保证 notebook 输出实时推送
        proxy_buffering off;
    }

    # ========================
    # PhotoPrism (Level 1 - 家庭相册)
    # 访问: /photo/
    # SITE_URL 含 /photo/ → PhotoPrism 原生工作在子路径下（类似 Jupyter 的 BASE_URL）
    # 无需 rewrite/sub_filter/proxy_redirect，直接透传
    # ========================

    # /photo (无尾斜杠) → 301 到 /photo/
    location = /photo {
        return 301 $scheme://$http_host/photo/;
    }

    location /photo/ {
        resolver 127.0.0.11 valid=30s;
        set $photoprism_upstream http://photoprism:2342;
        proxy_pass $photoprism_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_buffering off;
        client_max_body_size 500m;

        # 允许 iframe 嵌入（应用中心全屏模式）
        proxy_hide_header X-Frame-Options;
        proxy_hide_header Content-Security-Policy;
    }

    # ========================
    # Homarr Dashboard (Level 1 - 服务器仪表盘)
    # 访问: /home/
    # ========================

    location = /home {
        return 301 $scheme://$http_host/home/;
    }

    location /home/ {
        resolver 127.0.0.11 valid=30s;
        set $homarr_upstream http://homarr:7575;
        rewrite ^/home/(.*) /$1 break;
        proxy_pass $homarr_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Accept-Encoding "";
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;

        # 允许 iframe 嵌入（应用中心全屏模式）
        proxy_hide_header X-Frame-Options;
        proxy_hide_header Content-Security-Policy;

        # 改写后端返回的 Location 头，加上 /home 前缀（保留端口）
        proxy_redirect ~^/(.*) $scheme://$http_host/home/$1;

        # 改写 HTML 中的绝对路径
        sub_filter_once off;
        sub_filter_types text/html text/css application/javascript application/json;
        sub_filter 'href="/' 'href="/home/';
        sub_filter 'src="/' 'src="/home/';
        sub_filter 'action="/' 'action="/home/';
        sub_filter '"/api/' '"/home/api/';
    }

    # ========================
    # 主项目 (Level 2 - 可被迭代)
    # ========================

    location /api/ {
        proxy_pass http://frontend:80/api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        client_max_body_size 100m;
    }

    location ^~ /uploads/ {
        proxy_pass http://frontend:80/uploads/;
        proxy_set_header Host $host;
        expires 30d;
        add_header Cache-Control "public";
    }

    location ^~ /pwa-icons/ {
        proxy_pass http://frontend:80/pwa-icons/;
        expires 30d;
        add_header Cache-Control "public";
    }

    location = /sw.js {
        proxy_pass http://frontend:80/sw.js;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    location / {
        proxy_pass $root_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_vary on;
    gzip_min_length 1000;
}
